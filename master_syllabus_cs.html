const state = {};
TRACKS.forEach(t => {
  t.sections.forEach(s => {
    s.topics.forEach((_, i) => {
      const key = `${t.id}::${s.title}::${i}`;
      state[key] = false;
    });
  });
});

function getTotal() { return Object.keys(state).length; }
function getDone() { return Object.values(state).filter(Boolean).length; }

function updateProgress() {
  const total = getTotal();
  const done = getDone();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} / ${total} topics completed`;
}

function toggle(key) {
  state[key] = !state[key];
  const row = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (row) {
    row.querySelector('.check').classList.toggle('done', state[key]);
    row.querySelector('.topic-text').classList.toggle('done-text', state[key]);
  }
  updateProgress();
}

function renderPanels() {
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  TRACKS.forEach((track, ti) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (ti === 0 ? ' active' : '');
    tab.textContent = track.label;
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + track.id).classList.add('active');
    };
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel content' + (ti === 0 ? ' active' : '');
    panel.id = 'panel-' + track.id;

    track.sections.forEach(section => {
      const secDiv = document.createElement('div');
      secDiv.className = 'section';
      const secTitle = document.createElement('div');
      secTitle.className = 'section-title';
      secTitle.textContent = section.title;
      secDiv.appendChild(secTitle);

      section.topics.forEach((topic, i) => {
        const key = `${track.id}::${section.title}::${i}`;
        const row = document.createElement('div');
        row.className = 'topic-row';
        row.setAttribute('data-key', key);
        row.innerHTML = `<div class="check"></div><div class="topic-text">${topic}</div>`;
        row.onclick = () => toggle(key);
        secDiv.appendChild(row);
      });

      panel.appendChild(secDiv);
    });
    panelsEl.appendChild(panel);
  });
}

renderPanels();
updateProgress();
</script>
